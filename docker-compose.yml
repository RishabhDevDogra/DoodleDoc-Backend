services:
  backend:
    build: .
    container_name: doodledoc-backend
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./DoodleDocs.Web
      args:
        REACT_APP_API_URL: "http://localhost:8080"
    container_name: doodledoc-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
